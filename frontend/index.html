<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MiniGovern Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        MiniGovern
                    </h2>

                    <div class="mb-3">
                        <label>Username</label>

                        <input
                                id="username"
                                class="form-control">
                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input
                                id="password"
                                type="password"
                                class="form-control">

                    </div>

                    <button
                            class="btn btn-primary w-100"
                            onclick="login()">

                        Login

                    </button>

                    <p
                            id="error_code"
                            class="text-danger mt-3">
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
