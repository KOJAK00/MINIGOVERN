<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniGovern Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-2 bg-dark text-white vh-100 p-3">
            <h3 class="mb-4">
                MiniGovern
            </h3>

            <div class="list-group">

                <a href="dashboard.html"
                   class="list-group-item list-group-item-action">
                    Dashboard
                </a>

                <a href="datasources.html"
                   class="list-group-item list-group-item-action">
                    Data Sources
                </a>

                <a href="datasets.html"
                   class="list-group-item list-group-item-action">
                    Datasets
                </a>

                <a href="sample.html"
                   class="list-group-item list-group-item-action">
                    Sample Page
                </a>

                <button
                        onclick="logout()"
                        class="btn btn-danger mt-4">

                    Logout

                </button>

            </div>

        </div>


        <div class="col-10 p-5">

            <h1>
                Dashboard
            </h1>

            <hr>

            <div class="row mt-4">

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Data Sources</h5>

                            <h2 id="datasource-count">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Datasets</h5>

                            <h2 id="dataset-count">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-3">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Tags</h5>

                            <h2 id="tag-count">
                                0
                            </h2>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/aut.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
